<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient - Editorial Stone-Warm Palette -->
    <radialGradient id="bgGrad2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FCFAF7" />
      <stop offset="100%" stop-color="#E2DDD5" />
    </radialGradient>
    
    <!-- Warm Gold / Brass Material Gradients -->
    <linearGradient id="antiqueBrass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EADAA9" />
      <stop offset="20%" stop-color="#C7B27C" />
      <stop offset="50%" stop-color="#FAF1D3" />
      <stop offset="75%" stop-color="#9C824E" />
      <stop offset="100%" stop-color="#6E5528" />
    </linearGradient>

    <linearGradient id="darkBrass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#AB955E" />
      <stop offset="100%" stop-color="#4F3F1C" />
    </linearGradient>
    
    <!-- Dark Gray/Black Braided Webbing Material -->
    <linearGradient id="charcoalCord" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2D2B2A" />
      <stop offset="50%" stop-color="#403D3C" />
      <stop offset="100%" stop-color="#1A1918" />
    </linearGradient>
    <linearGradient id="blackCord" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#141413" />
      <stop offset="60%" stop-color="#2A2A29" />
      <stop offset="100%" stop-color="#0F0F0E" />
    </linearGradient>

    <!-- Bronze Tag -->
    <linearGradient id="bronzeTag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D9A05B" />
      <stop offset="50%" stop-color="#9E6728" />
      <stop offset="100%" stop-color="#5E380D" />
    </linearGradient>

    <!-- Shadows -->
    <filter id="heavyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="12" dy="20" stdDeviation="16" flood-color="#4A433A" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Canvas Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad2)" />

  <!-- Main Shadowed Object Assembly -->
  <g filter="url(#heavyShadow)" transform="translate(0, -10)">
    
    <!-- MAIN KNOTTED LEATHER LOOP STRAP (Flowing from center-top into circle connector) -->
    <g transform="translate(250, 60)">
      
      <!-- Right Strap String -->
      <path d="M 8 0 
               C 12 50, 18 100, 16 160 
               L -2 160 
               C -1 100, -6 50, -8 0 
               Z" 
            fill="url(#charcoalCord)" opacity="0.95" />
      
      <!-- Left Strap String -->
      <path d="M -16 0 
               C -12 50, -8 100, -10 160 
               L -24 160 
               C -22 100, -26 50, -28 0 
               Z" 
            fill="url(#blackCord)" opacity="0.95" stroke-width="0.5" />
      
      <!-- Braided / Knotted Overlay Details (Strap patterns/grain) -->
      <!-- Handcrafted stitches & ribs on charcoal string -->
      <path d="M 6 15 H -6 M 8 35 H -4 M 10 55 H -2 M 12 75 H 0 M 13 95 H 1 M 15 115 H 3 M 16 135 H 4" stroke="#5E5855" stroke-dasharray="2,3" stroke-width="1.5" />
      <!-- Handcrafted stitches & ribs on black string -->
      <path d="M -26 15 H -14 M -24 35 H -12 M -22 55 H -10 M -20 75 H -8 M -19 95 H -7 M -17 115 H -5 M -18 135 H -6" stroke="#4F4946" stroke-dasharray="2,3" stroke-width="1.5" stroke-opacity="0.6" />

      <!-- THE CRAFT "KNOT" - Thick wrap bands right above the metallic ring -->
      <!-- Wrap 1 -->
      <rect x="-35" y="145" width="56" height="15" rx="5" fill="url(#antiqueBrass)" stroke="#4A3F29" stroke-width="1" />
      <line x1="-31" y1="145" x2="-31" y2="160" stroke="#7A6843" stroke-width="1.5" />
      <line x1="-20" y1="145" x2="-20" y2="160" stroke="#7A6843" stroke-width="1.5" />
      <line x1="-9" y1="145" x2="-9" y2="160" stroke="#7A6843" stroke-width="1.5" />
      <line x1="2" y1="145" x2="2" y2="160" stroke="#7A6843" stroke-width="1.5" />
      <line x1="13" y1="145" x2="13" y2="160" stroke="#7A6843" stroke-width="1.5" />

      <!-- Wrap 2: Main Heavy Cotton/Leather Thread Tie -->
      <path d="M -30 160 
               C -30 160, 15 158, 20 160 
               L 18 185 
               C 18 185, -28 187, -32 185 
               Z" 
            fill="url(#blackCord)" stroke="#0E0E0D" stroke-width="1.5" />
            
      <!-- Leather thread crossing details on knot -->
      <path d="M -22 160 L 10 185" stroke="#87756B" stroke-width="2" opacity="0.8" />
      <path d="M -10 160 L 16 181" stroke="#87756B" stroke-width="2" opacity="0.8" />
      <path d="M -26 178 L 0 161" stroke="#87756B" stroke-width="2" opacity="0.6" />
      <path d="M -16 183 L 10 161" stroke="#87756B" stroke-width="2" opacity="0.6" />

      <!-- Tight thread securing base wrapping -->
      <rect x="-34" y="185" width="54" height="10" rx="3" fill="url(#darkBrass)" stroke="#302611" stroke-width="0.8" />
    </g>

    <!-- GIANT SIGNATURE ANTIQUE BRASS CIRCLE CONNECTOR (Center of gravity) -->
    <!-- Shadow backdrop -->
    <circle cx="243" cy="295" r="76" fill="none" stroke="#2B210C" stroke-width="18" opacity="0.12" />
    <!-- Outer ring representation -->
    <circle cx="243" cy="295" r="74" fill="none" stroke="url(#antiqueBrass)" stroke-width="17.5" />
    <!-- Highlight inner circle ring edge -->
    <circle cx="243" cy="295" r="66" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.55" />
    <circle cx="243" cy="295" r="81" fill="none" stroke="#3D2E12" stroke-width="1.2" opacity="0.3" />

    <!-- Screw-in thread/indents -->
    <path d="M 235 220 L 251 220 C 255 210, 231 210, 235 220 Z" fill="url(#darkBrass)" />
    <!-- Connector segment lines representing heavy heavy mechanical segments -->
    <line x1="175" y1="265" x2="183" y2="273" stroke="#4F3F1C" stroke-width="2.5" opacity="0.5" />
    <line x1="311" y1="265" x2="303" y2="273" stroke="#4F3F1C" stroke-width="2.5" opacity="0.5" />
    <line x1="243" y1="368" x2="243" y2="378" stroke="#4F3F1C" stroke-width="2.5" opacity="0.5" />

    <!-- MINI BRASS BRANDING MEDAL (Dangling dynamically underneath the circle connector) -->
    <g transform="translate(180, 340) rotate(-45)">
      <!-- Connector Brass Loop link -->
      <ellipse cx="10" cy="5" rx="4" ry="7" fill="none" stroke="url(#antiqueBrass)" stroke-width="3.5" />
      <!-- Solid metal pendant tag -->
      <rect x="-10" y="12" width="40" height="70" rx="8" fill="url(#bronzeTag)" stroke="#3B230C" stroke-width="1.5" />
      <circle cx="10" cy="22" r="5" fill="#2E1C0A" />
      <!-- Stylised branding circle and letter -->
      <circle cx="10" cy="52" r="14" fill="none" stroke="#F5DDB3" stroke-width="1" opacity="0.3" />
      <text x="10" y="57" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700" fill="#1C1004" text-anchor="middle" letter-spacing="1">M</text>
      <text x="10" y="58" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700" fill="#FFE5BD" text-anchor="middle" opacity="0.15">M</text>
    </g>

    <!-- KEYRING ACCESSORY 2: AN ANTIQUE HOUSE KEY (Hanging elegantly) -->
    <g transform="translate(265, 345) rotate(15)">
      <!-- Ring holding key -->
      <circle cx="10" cy="10" r="12" fill="none" stroke="url(#antiqueBrass)" stroke-width="3" />
      <!-- Vintage key body mapping -->
      <!-- Bow/Head of the key -->
      <path d="M -10 32
               C -25 32, -25 56, -10 56
               C -8 56, 2 48, 4 44
               L 4 110
               C 4 114, 12 114, 12 110
               L 12 44
               C 14 48, 24 56, 26 56
               C 41 56, 41 32, 26 32
               C 22 32, 12 38, 8 40
               L 8 30
               C 8 18, 8 18, 10 10
               L 6 10
               C 6 18, 8 18, 8 30
               L 8 40
               C 4 38, -6 32, -10 32
               Z" 
            fill="url(#antiqueBrass)" stroke="#3D2E12" stroke-width="1.5" />
      
      <!-- Inside cutouts in key bow -->
      <circle cx="-13" cy="44" r="5" fill="#E2DDD5" stroke="#3D2E12" stroke-width="1" />
      <circle cx="29" cy="44" r="5" fill="#E2DDD5" stroke="#3D2E12" stroke-width="1" />
      
      <!-- Key bit (teeth at the bottom of key shaft) -->
      <path d="M 12 90 H 24 V 96 H 12 V 100 H 22 V 106 H 12 Z" fill="url(#antiqueBrass)" stroke="#3D2E12" stroke-width="1.5" />
    </g>

  </g>
</svg>
