<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Rich Neutral Light Warm Gray / Bone -->
    <radialGradient id="ringBgGrad2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#FAF9F6" />
      <stop offset="60%" stop-color="#F2EFE8" />
      <stop offset="100%" stop-color="#DDD8CD" />
    </radialGradient>

    <!-- Ultimate High-Polished Sterling Silver Facet Gradients -->
    <linearGradient id="silverSolid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F2F3" />
      <stop offset="10%" stop-color="#C5C9CD" />
      <stop offset="22%" stop-color="#84898D" />
      <stop offset="35%" stop-color="#D9DCE0" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="65%" stop-color="#696D71" />
      <stop offset="80%" stop-color="#B2B7BB" />
      <stop offset="92%" stop-color="#E2E4E7" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>

    <linearGradient id="silverSolidSide" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#404345" />
      <stop offset="30%" stop-color="#9CA0A3" />
      <stop offset="60%" stop-color="#E9ECEE" />
      <stop offset="85%" stop-color="#606366" />
      <stop offset="100%" stop-color="#242628" />
    </linearGradient>

    <linearGradient id="silverSolidInner" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#282A2B" />
      <stop offset="40%" stop-color="#73777A" />
      <stop offset="70%" stop-color="#CDD1D3" />
      <stop offset="100%" stop-color="#141516" />
    </linearGradient>

    <linearGradient id="solidGloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8" />
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.5" />
    </linearGradient>

    <!-- Deep realistic heavy physical Drop Shadow representing modern luxury packaging/studio setup -->
    <filter id="solidRingShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="12" dy="24" stdDeviation="16" flood-color="#4F4638" flood-opacity="0.34" />
      <feDropShadow dx="4" dy="6" stdDeviation="4" flood-color="#1A1918" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Editorial Studio Canvas Background -->
  <rect width="100%" height="100%" fill="url(#ringBgGrad2)" />

  <!-- Main Solid Band Assembly with Shadow -->
  <g filter="url(#solidRingShadow)" transform="translate(0, 10)">
    
    <!-- Inner part of 3D Ring Band (Inner wall) -->
    <ellipse cx="250" cy="210" rx="95" ry="50" fill="url(#silverSolidInner)" stroke="#4A4E50" stroke-width="0.5" />

    <!-- Solid Polished Thick Silver Band Main Oval (Standing layout) -->
    <!-- Outer thick profile path -->
    <path d="M 140 220
             C 140 145, 360 145, 360 220
             C 360 295, 314 314, 250 314
             C 186 314, 140 295, 140 220 Z" 
          fill="url(#silverSolid)" stroke="#AEB2B5" stroke-width="1.5" />

    <!-- Flat polished front facet profile (Highlights "Flat Polished Half Band" concept) -->
    <path d="M 148 220
             C 148 155, 352 155, 352 220
             C 352 284, 308 302, 250 302
             C 192 302, 148 284, 148 220 Z" 
          fill="url(#silverSolidSide)" opacity="0.9" />

    <!-- Linear gloss highlight line to elevate premium luster -->
    <path d="M 152 220
             C 152 165, 348 165, 348 220
             C 348 274, 304 290, 250 290
             C 196 290, 152 274, 152 220 Z" 
          fill="url(#solidGloss)" />

    <!-- Extra hand-crafted fine highlight on top crown border -->
    <path d="M 140 220 C 140 145, 360 145, 360 220" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.65" />
    
    <!-- Soft light refles to solidify solid edge cuts -->
    <circle cx="144" cy="220" r="3" fill="#FFFFFF" opacity="0.9" filter="blur(0.5px)" />
    <circle cx="356" cy="220" r="3" fill="#FFFFFF" opacity="0.9" filter="blur(0.5px)" />

    <!-- Center sparkle reflection (Luxury glint) -->
    <g transform="translate(250, 150) scale(1.1)">
      <path d="M 0 -10 Q 0 0 10 0 Q 0 0 0 10 Q 0 0 -10 0 Q 0 0 0 -10 Z" fill="#FFFFFF" opacity="0.95" />
      <circle cx="0" cy="0" r="2.5" fill="#FFFFFF" />
    </g>

    <!-- Bottom reflection highlight on the bone backplate -->
    <ellipse cx="250" cy="318" rx="60" ry="4" fill="#FFFFFF" opacity="0.4" filter="blur(1)" />
  </g>
</svg>
